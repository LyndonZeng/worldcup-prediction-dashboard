<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2026 World Cup Prediction Dashboard</title>
    <style>
      :root {
        --bg: #f2f4f7;
        --surface: rgba(255, 255, 255, 0.88);
        --solid: #ffffff;
        --soft: #eef2f7;
        --ink: #121721;
        --muted: #687386;
        --line: rgba(125, 139, 158, 0.24);
        --blue: #1d4ed8;
        --cyan: #0891b2;
        --green: #12805c;
        --red: #c2384d;
        --amber: #b7791f;
        --shadow: 0 18px 46px rgba(20, 31, 48, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.78), rgba(242, 244, 247, 0.96) 320px),
          radial-gradient(circle at top left, rgba(29, 78, 216, 0.1), transparent 370px),
          linear-gradient(120deg, rgba(8, 145, 178, 0.1), rgba(255, 255, 255, 0) 48%);
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .shell {
        width: min(1560px, 100%);
        margin: 0 auto;
        padding: 20px;
      }

      .deck,
      .controls,
      .metrics,
      .workspace,
      .lower {
        margin-bottom: 14px;
      }

      .deck,
      .controls,
      .metric,
      .panel,
      .match-list,
      .detail,
      .rail {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .deck {
        min-height: 120px;
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
      }

      .brand {
        display: flex;
        gap: 14px;
        align-items: center;
      }

      .mark {
        width: 48px;
        height: 48px;
        display: grid;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--solid);
        color: var(--blue);
        font-weight: 900;
      }

      .eyebrow {
        margin: 0 0 5px;
        color: var(--blue);
        font-size: 12px;
        font-weight: 850;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(28px, 4vw, 44px);
        line-height: 1.02;
      }

      .copy {
        margin-top: 8px;
        color: var(--muted);
        line-height: 1.6;
      }

      .hosts,
      .badges,
      .team-line,
      .inline-team,
      .tabs,
      .venue,
      .availability-head,
      .weather-grid {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .hosts {
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .host {
        min-width: 92px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.76);
      }

      .host strong,
      .host span,
      .metric span,
      .metric small {
        display: block;
      }

      .host span,
      .metric span,
      .metric small,
      .muted,
      .match-meta,
      .source span,
      .tile span,
      .factor em,
      .player em {
        color: var(--muted);
      }

      .controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 8px;
      }

      .search {
        width: min(470px, 100%);
        height: 42px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--solid);
      }

      .search input {
        width: 100%;
        min-width: 0;
        border: 0;
        outline: 0;
        background: transparent;
      }

      .segments,
      .tabs {
        gap: 4px;
        padding: 4px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--soft);
        overflow-x: auto;
      }

      .segments button,
      .tabs button {
        height: 32px;
        min-width: 42px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
        white-space: nowrap;
      }

      .segments button.active,
      .tabs button.active {
        background: var(--solid);
        color: var(--ink);
        box-shadow: 0 1px 5px rgba(24, 34, 48, 0.1);
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
      }

      .metric {
        min-height: 112px;
        padding: 14px;
      }

      .metric b {
        display: block;
        margin-top: 8px;
        font-size: 25px;
      }

      .workspace {
        display: grid;
        grid-template-columns: 340px minmax(0, 1fr) 360px;
        gap: 14px;
        align-items: start;
      }

      .match-list,
      .detail,
      .rail,
      .panel {
        overflow: hidden;
      }

      .detail {
        padding: 14px;
      }

      .head {
        min-height: 48px;
        padding: 0 14px;
        display: flex;
        align-items: center;
        gap: 8px;
        border-bottom: 1px solid var(--line);
      }

      .head span {
        margin-left: auto;
        color: var(--muted);
        font-size: 12px;
      }

      .match-row {
        width: 100%;
        padding: 13px 14px;
        display: grid;
        gap: 8px;
        text-align: left;
        border: 0;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.38);
        color: var(--ink);
      }

      .match-row.active,
      .match-row:hover {
        background: rgba(255, 255, 255, 0.86);
      }

      .match-row.active {
        box-shadow: inset 3px 0 0 var(--blue);
      }

      .team-line {
        justify-content: space-between;
      }

      .badges {
        flex-wrap: wrap;
      }

      .badge,
      .risk,
      .lean,
      .note {
        display: inline-flex;
        min-height: 24px;
        align-items: center;
        padding: 0 8px;
        border-radius: 7px;
        font-size: 12px;
        font-weight: 850;
        background: #e6edf5;
        color: #31516f;
      }

      .flag {
        width: 25px;
        height: 17px;
        object-fit: cover;
        flex: 0 0 auto;
        border: 1px solid rgba(18, 23, 33, 0.14);
        border-radius: 4px;
        background: var(--soft);
      }

      .flag.big {
        width: 54px;
        height: 36px;
      }

      .hero {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.94), rgba(239, 244, 250, 0.86));
      }

      .hero h2 {
        margin-top: 4px;
        font-size: clamp(24px, 3vw, 38px);
        line-height: 1.05;
      }

      .venue {
        margin-top: 10px;
        color: var(--muted);
        line-height: 1.5;
      }

      .score-lens {
        min-width: 250px;
        padding: 10px;
        display: grid;
        grid-template-columns: 54px minmax(110px, 1fr) 54px;
        gap: 10px;
        align-items: center;
        text-align: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.74);
      }

      .score-lens strong {
        display: block;
        font-size: 25px;
        font-variant-numeric: tabular-nums;
      }

      .prob {
        margin: 14px 0;
      }

      .prob-labels {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 13px;
      }

      .prob-labels span:nth-child(2) {
        text-align: center;
      }

      .prob-labels span:nth-child(3) {
        text-align: right;
      }

      .prob-bar {
        height: 18px;
        display: flex;
        overflow: hidden;
        border-radius: 6px;
        background: var(--soft);
      }

      .home { background: var(--blue); }
      .draw { background: var(--amber); }
      .away { background: var(--green); }

      .table-wrap {
        width: 100%;
        overflow-x: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--solid);
      }

      table {
        width: 100%;
        min-width: 850px;
        border-collapse: collapse;
        font-size: 14px;
      }

      th,
      td {
        padding: 11px 12px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      th {
        color: var(--muted);
        font-size: 12px;
        font-weight: 850;
        background: #f7f9fc;
        white-space: nowrap;
      }

      td small {
        display: block;
        margin-top: 3px;
        color: var(--muted);
      }

      .mono {
        font-variant-numeric: tabular-nums;
        font-family: "SF Mono", Consolas, ui-monospace, monospace;
      }

      .lean.home-lean {
        color: #123f91;
        background: #dce8ff;
      }

      .lean.away-lean {
        color: #075c3b;
        background: #d9fbe8;
      }

      .tabs {
        width: fit-content;
        max-width: 100%;
        margin-bottom: 12px;
      }

      .grid,
      .split,
      .rail-body {
        display: grid;
        gap: 10px;
      }

      .grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .tech-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        margin-top: 10px;
      }

      .split {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .tile,
      .subpanel {
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f8fafc;
      }

      .tile strong {
        display: block;
        margin-top: 6px;
        line-height: 1.35;
      }

      .factor {
        display: grid;
        grid-template-columns: minmax(120px, 1fr) minmax(120px, 1fr) 52px;
        gap: 10px;
        align-items: center;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.72);
      }

      .track {
        height: 10px;
        display: grid;
        grid-template-columns: 1fr 2px 1fr;
        overflow: hidden;
        border-radius: 5px;
        background: var(--soft);
      }

      .track b {
        background: rgba(18, 23, 33, 0.24);
      }

      .edge-away {
        justify-self: end;
        height: 100%;
        background: var(--green);
      }

      .edge-home {
        justify-self: start;
        height: 100%;
        background: var(--blue);
      }

      .rail {
        padding-bottom: 12px;
      }

      .rail-body {
        padding: 12px;
      }

      .weather-grid {
        flex-wrap: wrap;
      }

      .weather-grid span {
        min-width: calc(50% - 4px);
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f8fafc;
      }

      .availability {
        display: grid;
        gap: 8px;
      }

      .availability-head {
        justify-content: space-between;
      }

      .risk.low {
        color: var(--green);
        background: #ddf8eb;
      }

      .risk.medium {
        color: var(--amber);
        background: #fff3d7;
      }

      .risk.elevated {
        color: var(--red);
        background: #ffe1e7;
      }

      .player {
        display: grid;
        grid-template-columns: minmax(80px, 1fr) 62px 46px;
        gap: 8px;
        align-items: center;
        min-height: 30px;
        padding: 0 8px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #f8fafc;
      }

      .source {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f8fafc;
      }

      .source em {
        color: var(--cyan);
        font-size: 12px;
        font-style: normal;
        font-weight: 850;
        white-space: nowrap;
      }

      .lower {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(330px, 0.8fr);
        gap: 14px;
      }

      .title-row {
        display: grid;
        grid-template-columns: 28px 34px minmax(120px, 1fr) minmax(80px, 1.6fr) 62px;
        gap: 10px;
        align-items: center;
        padding: 10px 14px;
        border-bottom: 1px solid var(--line);
      }

      .title-team {
        min-width: 0;
      }

      .title-team strong,
      .title-team em {
        display: block;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .title-team em {
        margin-top: 3px;
        color: var(--muted);
        font-size: 11px;
        font-style: normal;
      }

      .mini {
        height: 8px;
        overflow: hidden;
        border-radius: 4px;
        background: var(--soft);
      }

      .mini i {
        display: block;
        height: 100%;
        background: linear-gradient(90deg, var(--blue), var(--cyan), var(--green));
      }

      @media (max-width: 1260px) {
        .workspace {
          grid-template-columns: 320px minmax(0, 1fr);
        }

        .rail {
          grid-column: 1 / -1;
        }
      }

      @media (max-width: 980px) {
        .deck,
        .controls {
          align-items: stretch;
          flex-direction: column;
        }

        .metrics,
        .workspace,
        .lower,
        .split {
          grid-template-columns: 1fr;
        }

        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .hero {
          flex-direction: column;
        }

        .score-lens {
          width: 100%;
          min-width: 0;
        }
      }

      @media (max-width: 680px) {
        .shell {
          padding: 12px;
        }

        .metrics,
        .grid {
          grid-template-columns: 1fr;
        }

        .tech-grid {
          grid-template-columns: 1fr;
        }

        .prob-labels {
          grid-template-columns: 1fr;
        }

        .prob-labels span,
        .prob-labels span:nth-child(2),
        .prob-labels span:nth-child(3) {
          text-align: left;
        }

        .factor {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <style>
      :root {
        --bg: #03060a;
        --surface: rgba(8, 14, 20, 0.78);
        --solid: #0c141d;
        --soft: rgba(18, 29, 39, 0.88);
        --ink: #f5f7fb;
        --muted: #93a2b6;
        --line: rgba(139, 163, 190, 0.22);
        --line-strong: rgba(209, 228, 255, 0.34);
        --blue: #66b7ff;
        --cyan: #38d5e8;
        --green: #25d990;
        --red: #ff5f72;
        --amber: #f2c14e;
        --shadow: 0 24px 70px rgba(0, 0, 0, 0.44);
      }

      html {
        overflow-x: hidden;
        background: var(--bg);
      }

      body {
        min-height: 100vh;
        overflow-x: hidden;
        color: var(--ink);
        background:
          linear-gradient(180deg, rgba(2, 6, 10, 0.72), #03060a 440px),
          linear-gradient(115deg, rgba(242, 193, 78, 0.18), transparent 24%, rgba(37, 217, 144, 0.12) 48%, transparent 66%),
          repeating-linear-gradient(90deg, rgba(139, 163, 190, 0.06) 0 1px, transparent 1px 88px),
          repeating-linear-gradient(0deg, rgba(139, 163, 190, 0.045) 0 1px, transparent 1px 72px),
          #03060a;
      }

      body::before {
        position: fixed;
        inset: 0;
        pointer-events: none;
        content: "";
        opacity: 0.46;
        background:
          linear-gradient(90deg, transparent 0 7%, rgba(37, 217, 144, 0.2) 7.1% 7.25%, transparent 7.35% 92.65%, rgba(37, 217, 144, 0.16) 92.75% 92.9%, transparent 93%),
          linear-gradient(0deg, transparent 0 16%, rgba(102, 183, 255, 0.18) 16.1% 16.22%, transparent 16.34% 83.66%, rgba(102, 183, 255, 0.14) 83.78% 83.9%, transparent 84%),
          linear-gradient(120deg, rgba(255, 255, 255, 0.06), transparent 28%);
        mask-image: linear-gradient(180deg, black, transparent 82%);
      }

      .shell {
        position: relative;
        z-index: 1;
        width: min(1640px, 100%);
      }

      .deck,
      .controls,
      .metric,
      .panel,
      .match-list,
      .detail,
      .rail,
      .subpanel {
        color: var(--ink);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
        backdrop-filter: blur(20px);
      }

      .deck {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(330px, 460px);
        align-items: stretch;
        min-height: 250px;
        padding: 22px;
        overflow: hidden;
        border-color: var(--line-strong);
        background:
          linear-gradient(135deg, rgba(10, 19, 29, 0.94), rgba(5, 11, 17, 0.82) 52%, rgba(30, 54, 48, 0.82)),
          linear-gradient(90deg, rgba(242, 193, 78, 0.18), transparent 34%, rgba(56, 213, 232, 0.12));
      }

      .deck::before {
        position: absolute;
        inset: 0;
        pointer-events: none;
        content: "";
        background:
          repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.07) 0 1px, transparent 1px 42px),
          repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.045) 0 1px, transparent 1px 42px),
          linear-gradient(114deg, transparent 0 34%, rgba(242, 193, 78, 0.12) 34.2% 34.6%, transparent 34.8%);
        mask-image: linear-gradient(90deg, black, transparent 78%);
      }

      .brand,
      .hero-telemetry {
        position: relative;
        z-index: 1;
      }

      .brand {
        min-width: 0;
      }

      .brand > div:last-child {
        min-width: 0;
      }

      .mark {
        width: 68px;
        height: 68px;
        color: #071018;
        border-color: rgba(255, 255, 255, 0.22);
        background: linear-gradient(145deg, #ffe58f, #f2c14e 54%, #23d18b);
        box-shadow: 0 18px 42px rgba(242, 193, 78, 0.24), inset 0 1px 0 rgba(255, 255, 255, 0.6);
      }

      .eyebrow {
        color: var(--amber);
      }

      h1 {
        max-width: 820px;
        color: var(--ink);
        font-size: clamp(38px, 6vw, 76px);
        line-height: 0.96;
        overflow-wrap: anywhere;
        word-break: break-all;
      }

      .copy {
        max-width: 720px;
        color: #c7d2e2;
        font-size: 16px;
      }

      .hero-telemetry {
        display: grid;
        grid-template-rows: 1fr auto auto;
        gap: 10px;
        min-width: 0;
      }

      .signal-plate {
        position: relative;
        display: grid;
        align-content: center;
        min-height: 150px;
        padding: 18px;
        overflow: hidden;
        border: 1px solid rgba(102, 183, 255, 0.26);
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(7, 16, 24, 0.78), rgba(12, 28, 39, 0.66)),
          repeating-linear-gradient(90deg, rgba(102, 183, 255, 0.12) 0 1px, transparent 1px 28px);
        box-shadow: inset 0 0 42px rgba(37, 217, 144, 0.08);
      }

      .signal-plate::before {
        position: absolute;
        right: 16px;
        top: 16px;
        width: 92px;
        height: 92px;
        content: "";
        border: 1px solid rgba(37, 217, 144, 0.5);
        border-radius: 50%;
        background: conic-gradient(from 40deg, rgba(37, 217, 144, 0.08), rgba(102, 183, 255, 0.45), rgba(242, 193, 78, 0.2), rgba(37, 217, 144, 0.08));
        box-shadow: inset 0 0 0 18px rgba(3, 6, 10, 0.62);
      }

      .signal-plate span,
      .signal-plate strong,
      .signal-plate em {
        position: relative;
        z-index: 1;
        display: block;
      }

      .signal-plate span {
        color: var(--cyan);
        font-size: 12px;
        font-weight: 850;
      }

      .signal-plate strong {
        margin-top: 4px;
        color: var(--ink);
        font-size: 54px;
        line-height: 0.95;
        text-shadow: 0 0 24px rgba(102, 183, 255, 0.5);
      }

      .signal-plate em {
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
        font-style: normal;
      }

      .hosts {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        justify-content: stretch;
      }

      .host {
        min-width: 0;
        border-color: rgba(242, 193, 78, 0.24);
        background: rgba(255, 255, 255, 0.06);
      }

      .host strong {
        color: var(--ink);
      }

      .status-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .status-pills span {
        min-height: 30px;
        display: inline-flex;
        align-items: center;
        padding: 0 10px;
        color: #dcecff;
        border: 1px solid rgba(102, 183, 255, 0.24);
        border-radius: 8px;
        background: rgba(102, 183, 255, 0.08);
        font-size: 12px;
        font-weight: 760;
      }

      .controls {
        display: grid;
        grid-template-columns: minmax(260px, 470px) minmax(0, 1fr);
        background: rgba(5, 12, 18, 0.72);
      }

      .search {
        color: var(--cyan);
        border-color: rgba(102, 183, 255, 0.22);
        background: rgba(255, 255, 255, 0.06);
      }

      .search input {
        color: var(--ink);
      }

      .search input::placeholder {
        color: #5f7188;
      }

      .segments,

  <body>
    <main class="shell">
      <section class="deck">
        <div class="brand">
          <div class="mark">WC</div>
          <div>
            <p class="eyebrow">2026 WORLD CUP MODEL ROOM</p>
            <h1>预测数据控制台</h1>
            <p class="copy">胜平负、比分分布、亚洲让球、球员健康、历史形态与天气因子统一展示。</p>
          </div>
        </div>
        <div class="hero-telemetry" aria-label="model telemetry">
          <div class="signal-plate">
            <span>MODEL</span>

          </div>

            <div class="host"><strong>USA</strong><span>11 venues</span></div>
            <div class="host"><strong>MEX</strong><span>3 venues</span></div>
            <div class="host"><strong>CAN</strong><span>2 venues</span></div>
          </div>
          <div class="status-pills">
            <span id="hero-markets">0 handicap markets</span>
            <span id="hero-sources">0/0 data sources</span>
          </div>
        </div>
      </section>

      <section class="controls">
        <label class="search">
          <span>搜索</span>
          <input id="search" placeholder="球队、城市或球场" />
        </label>
        <div id="groups" class="segments"></div>
      </section>

      <section id="metrics" class="metrics"></section>

      <section class="workspace">
        <aside class="match-list">
          <div class="head"><h2>比赛雷达</h2><span id="match-count">0</span></div>
          <div id="match-list"></div>
        </aside>

        <article class="detail">
          <div id="detail"></div>
        </article>

        <aside class="rail">
          <div class="head"><h2>赛前情报</h2><span id="rail-group">-</span></div>
          <div id="rail" class="rail-body"></div>
        </aside>
      </section>

      <section class="lower">
        <div class="panel">
          <div class="head"><h2>夺冠概率</h2><span id="sim-count">sims</span></div>
          <div id="tournament"></div>
        </div>
        <div class="panel">
          <div class="head"><h2>数据源健康</h2><span id="source-count">sources</span></div>
          <div id="sources" class="rail-body"></div>
        </div>
      </section>
    </main>

    <script>
      const API = "http://127.0.0.1:8000";
      const ESPN_SCOREBOARD = "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard";
      const embeddedData = window.__DASHBOARD_DATA__ || null;
      const compressedDataChunks = ["data.json.gz.b64.0", "data.json.gz.b64.1", "data.json.gz.b64.2", "data.json.gz.b64.3", "data.json.gz.b64.4", "data.json.gz.b64.5", "data.json.gz.b64.6", "data.json.gz.b64.7"];
      const teamAliases = {
        "bosnia herzegovina": "bih",
        "bosnia and herzegovina": "bih",
        "czech republic": "cze",
        "czechia": "cze",
        "cote d ivoire": "civ",
        "ivory coast": "civ",
        "curacao": "cur",
        "cape verde": "cpv",
        "cabo verde": "cpv",
        "turkiye": "tur",
        "turkey": "tur",
        "usa": "usa",
        "united states": "usa",
        "congo dr": "cod",
        "dr congo": "cod"
      };
      const statMap = {
        possessionPct: "possession_pct",
        totalShots: "shots",
        shotsOnTarget: "shots_on_target",
        wonCorners: "corners",
        foulsCommitted: "fouls_committed",
        goalAssists: "assists",
        totalGoals: "goals",
        yellowCards: "yellow_cards",
        redCards: "red_cards"
      };
      let livePollTimer = null;
      let state = { matches: [], tournament: null, sources: [], selected: null, group: "ALL", query: "", tab: "handicap" };

      const fallback = {
        matches: [],
        tournament: { n_simulations: 100000, teams: [] },
        sources: []
      };

      const pct = (value) => value === null || value === undefined || Number.isNaN(value) ? "-" : `${(value * 100).toFixed(1)}%`;
      const odds = (value) => value ? Number(value).toFixed(2) : "-";
      const line = (value) => Number(value) > 0 ? `+${value}` : `${value}`;
      const signed = (value) => `${Number(value) >= 0 ? "+" : ""}${Number(value).toFixed(2)}`;
      const multiplier = (value) => `${Number(value) >= 1 ? "+" : ""}${((Number(value) - 1) * 100).toFixed(1)}%`;
      const flag = (team, big = false) => `<img class="flag ${big ? "big" : ""}" src="https://flagcdn.com/w40/${team.flag_code}.png" alt="${team.name || team.team} flag" />`;
      const team = (item) => `<span class="inline-team">${flag(item)}<span>${item.name || item.team}</span></span>`;
      const dateText = (value) => new Intl.DateTimeFormat("zh-CN", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", timeZone: "Asia/Shanghai" }).format(new Date(value));

      async function getJson(path, fallbackValue) {
        try {
          const url = path.startsWith(".") ? path : `${API}${path}`;
          const response = await fetch(url);
          if (!response.ok) return fallbackValue;
          return await response.json();
        } catch {
          return fallbackValue;
        }
      }

      async function getCompressedJson(paths) {
        if (!("DecompressionStream" in window)) return null;
        try {
          const chunks = await Promise.all(paths.map(async (path) => {
            const response = await fetch(path, { cache: "no-store" });
            if (!response.ok) throw new Error("missing chunk");
            return response.text();
          }));
          const binary = atob(chunks.join("").replace(/\s/g, ""));
          const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
          const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("gzip"));
          return JSON.parse(await new Response(stream).text());
        } catch {
          return null;
        }
      }

      async function boot() {
        const localData = embeddedData || await getCompressedJson(compressedDataChunks) || await getJson("./data.json", null);
        if (localData && localData.matches && localData.tournament && localData.sources) {
          state.matches = localData.matches;
          state.tournament = localData.tournament;
          state.sources = localData.sources;
          state.selected = state.matches[0] || null;
          bind();
          render();
          refreshFromApi();
          startPublicLivePolling();
          return;
        }
        const [matches, tournament, health] = await Promise.all([
          getJson("/api/matches", { matches: fallback.matches }),
          getJson("/api/tournament/probabilities", fallback.tournament),
          getJson("/api/source-health", { sources: fallback.sources })
        ]);
        state.matches = matches.matches || [];
        state.tournament = tournament;
        state.sources = health.sources || [];
        state.selected = state.matches[0] || null;
        bind();
        render();
        startPublicLivePolling();
      }

      async function refreshFromApi() {
        const [matches, tournament, health] = await Promise.all([
          getJson("/api/matches", null),
          getJson("/api/tournament/probabilities", null),
          getJson("/api/source-health", null)
        ]);
        if (!matches || !matches.matches || !tournament || !health || !health.sources) return;
        const selectedId = state.selected && state.selected.match_id;
        state.matches = matches.matches;
        state.tournament = tournament;
        state.sources = health.sources;
        state.selected = state.matches.find((match) => match.match_id === selectedId) || state.matches[0] || null;
        render();
      }

      function startPublicLivePolling() {
        if (livePollTimer || !state.matches.length) return;
        refreshFromEspnPublic();
        livePollTimer = window.setInterval(refreshFromEspnPublic, 60000);
      }

      async function refreshFromEspnPublic() {
        try {
          const payloads = await Promise.all(liveDateKeys().map(async (dateKey) => {
            const response = await fetch(`${ESPN_SCOREBOARD}?dates=${dateKey}`, { cache: "no-store" });
            if (!response.ok) return null;
            return response.json();
          }));
          const rows = normalizeEspnEvents(payloads.flatMap((payload) => payload?.events || []));
          if (!rows.length) return;
          const byId = new Map(rows.map((row) => [row.match_id, row]));
          state.matches = state.matches.map((match) => {
            const live = byId.get(match.match_id);
            if (!live) return match;
            return applyLiveToMatch({ ...match, live_status: live });
          });
          const selectedId = state.selected?.match_id;
          state.selected = state.matches.find((match) => match.match_id === selectedId) || state.matches[0] || null;
          updateEspnSource(rows);
          render();
        } catch (_error) {
          // Public live polling is best-effort; keep the last static snapshot.
        }
      }

      function liveDateKeys() {
        const out = [];
        const now = new Date();
        for (let offset = -1; offset <= 2; offset += 1) {
          const date = new Date(now.getTime() + offset * 86400000);
          out.push(dateKeyInZone(date, "America/New_York"));
        }
        return Array.from(new Set(out));
      }

      function dateKeyInZone(date, timeZone) {
        const parts = new Intl.DateTimeFormat("en-US", {
          timeZone,
          year: "numeric",
          month: "2-digit",
          day: "2-digit"
        }).formatToParts(date).reduce((acc, part) => {
          acc[part.type] = part.value;
          return acc;
        }, {});
        return `${parts.year}${parts.month}${parts.day}`;
      }

      function normalizeEspnEvents(events) {
        const aliases = teamAliasMap();
        const rows = [];
        const seen = new Set();
        for (const event of events) {
          const competition = event.competitions?.[0] || {};
          const competitors = competition.competitors || [];
          const home = competitors.find((row) => row.homeAway === "home");
          const away = competitors.find((row) => row.homeAway === "away");
          if (!home || !away) continue;
          const homeId = teamIdForCompetitor(home, aliases);
          const awayId = teamIdForCompetitor(away, aliases);
          const match = state.matches.find((candidate) => candidate.fixture.home_team_id === homeId && candidate.fixture.away_team_id === awayId);
          if (!match || seen.has(match.match_id)) continue;
          seen.add(match.match_id);
          const status = event.status || competition.status || {};
          const type = status.type || {};
          const liveOrFinal = Boolean(type.completed) || type.state === "in";
          rows.push({
            match_id: match.match_id,
            source: "ESPN public scoreboard",
            source_quality: "live_public_unofficial",
            captured_at: new Date().toISOString(),
            status_state: type.state,
            status_description: type.description,
            status_detail: type.detail || type.shortDetail,
            completed: Boolean(type.completed),
            display_clock: status.displayClock,
            period: status.period,
            home_score: liveOrFinal ? numberOrNull(home.score) : null,
            away_score: liveOrFinal ? numberOrNull(away.score) : null,
            winner_team_id: home.winner ? homeId : away.winner ? awayId : null,
            attendance: liveOrFinal ? competition.attendance : null,
            home_stats: liveOrFinal ? statsFromCompetitor(home) : {},
            away_stats: liveOrFinal ? statsFromCompetitor(away) : {}
          });
        }
        return rows;
      }

      function teamAliasMap() {
        const aliases = { ...teamAliases };
        state.matches.forEach((match) => {
          [match.home_team, match.away_team].forEach((teamInfo) => {
            aliases[key(teamInfo.name)] = teamInfo.id;
            aliases[key(teamInfo.fifa_code || "")] = teamInfo.id;
          });
        });
        return aliases;
      }

      function teamIdForCompetitor(competitor, aliases) {
        const teamInfo = competitor.team || {};
        const candidates = [teamInfo.displayName, teamInfo.shortDisplayName, teamInfo.name, teamInfo.location, teamInfo.abbreviation];
        for (const candidate of candidates) {
          const teamId = aliases[key(candidate || "")];
          if (teamId) return teamId;
        }
        return null;
      }

      function statsFromCompetitor(competitor) {
        const out = {};
        (competitor.statistics || []).forEach((stat) => {
          const mapped = statMap[stat.name];
          if (mapped) out[mapped] = numberOrNull(String(stat.displayValue || "").replace("%", ""));
        });
        return out;
      }

      function applyLiveToMatch(match) {
        const live = match.live_status;
        const hasStats = live && (Object.keys(live.home_stats || {}).length || Object.keys(live.away_stats || {}).length);
        const next = {
          ...match,
          event_predictions: applyLiveEvents(match.event_predictions, live)
        };
        if (!hasStats || !match.tactical_profile) return next;
        return {
          ...next,
          tactical_profile: {
            ...match.tactical_profile,
            source: "ESPN public scoreboard basic stats + seed-derived xG/PPDA",
            data_quality: "mixed_live_public_proxy",
            home: applyLiveStats(match.tactical_profile.home, live.home_stats),
            away: applyLiveStats(match.tactical_profile.away, live.away_stats)
          }
        };
      }

      function applyLiveEvents(events, live) {
        if (!events || !live) return events;
        const homeStats = live.home_stats || {};
        const awayStats = live.away_stats || {};
        return {
          ...events,
          data_quality: Object.keys(homeStats).length || Object.keys(awayStats).length ? "mixed_live_public_proxy" : events.data_quality,
          score: {
            ...(events.score || {}),
            actual_home_score: live.home_score,
            actual_away_score: live.away_score,
            status: live.status_description || live.status_state || events.score?.status
          },
          corners: {
            ...(events.corners || {}),
            live_home: homeStats.corners ?? events.corners?.live_home,
            live_away: awayStats.corners ?? events.corners?.live_away
          },
          cards: {
            ...(events.cards || {}),
            live_home_yellow: homeStats.yellow_cards ?? events.cards?.live_home_yellow,
            live_away_yellow: awayStats.yellow_cards ?? events.cards?.live_away_yellow,
            live_home_red: homeStats.red_cards ?? events.cards?.live_home_red,
            live_away_red: awayStats.red_cards ?? events.cards?.live_away_red
          }
        };
      }

      function applyLiveStats(profile, stats) {
        if (!profile || !stats) return profile;
        const next = { ...profile };
        if (stats.possession_pct !== null && stats.possession_pct !== undefined) next.possession_pct = Number(stats.possession_pct);
        if (stats.shots !== null && stats.shots !== undefined) next.shots_per_game = Number(stats.shots);
        if (stats.shots_on_target !== null && stats.shots_on_target !== undefined) next.shots_on_target_per_game = Number(stats.shots_on_target);
        next.live_corners = stats.corners;
        next.live_fouls_committed = stats.fouls_committed;
        next.live_assists = stats.assists;
        next.live_goals = stats.goals;
        next.live_yellow_cards = stats.yellow_cards;
        next.live_red_cards = stats.red_cards;
        next.live_public_stats = true;
        return next;
      }

      function updateEspnSource(rows) {
        const completed = rows.filter((row) => row.completed).length;
        const inPlay = rows.filter((row) => row.status_state === "in").length;
        const source = {
          source: "ESPN public scoreboard",
          status: "browser_live_public",
          freshness: `${rows.length} nearby events; ${completed} completed; ${inPlay} in-play at ${shortTime(new Date().toISOString())}`,
          purpose: "browser no-key live score, status and basic public match stats"
        };
        state.sources = [source, ...state.sources.filter((row) => row.source !== source.source)];
      }

      function numberOrNull(value) {
        if (value === null || value === undefined || value === "") return null;
        const number = Number(value);
        return Number.isFinite(number) ? number : null;
      }

      function key(value) {
        return String(value || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().replace(/[^a-z0-9]+/g, " ").trim();
      }

      function bind() {
        document.getElementById("search").addEventListener("input", (event) => {
          state.query = event.target.value.trim().toLowerCase();
          render();
        });
      }

      function filteredMatches() {
        return state.matches.filter((match) => {
          const inGroup = state.group === "ALL" || match.fixture.group === state.group;
          const q = state.query;
          const inQuery = !q ||
            match.home_team.name.toLowerCase().includes(q) ||
            match.away_team.name.toLowerCase().includes(q) ||
            match.fixture.city.toLowerCase().includes(q) ||
            match.fixture.venue.toLowerCase().includes(q);
          return inGroup && inQuery;
        });
      }

      function render() {
        if (!state.matches.length) {
          document.getElementById("detail").innerHTML = `<div class="subpanel">后端 API 暂时没有返回比赛数据。</div>`;
          return;
        }
        renderGroups();
        renderMetrics();
        renderMatchList();
        renderDetail();
        renderRail();
        renderTournament();
        renderSources();
      }

      function renderGroups() {
        const groups = ["ALL", ...Array.from(new Set(state.matches.map((match) => match.fixture.group))).sort()];
        document.getElementById("groups").innerHTML = groups.map((group) =>
          `<button class="${state.group === group ? "active" : ""}" data-group="${group}">${group === "ALL" ? "全部" : group}</button>`
        ).join("");
        document.querySelectorAll("[data-group]").forEach((button) => {
          button.addEventListener("click", () => {
            state.group = button.dataset.group;
            const next = filteredMatches()[0];
            if (next) state.selected = next;
            render();
          });
        });
      }

      function renderMetrics() {
        const top = state.tournament?.teams?.[0];
        const marketCount = state.matches.reduce((sum, match) => sum + match.handicap_preview.filter((row) => row.market_status === "available").length, 0);
        const confidence = state.selected ? confidenceScore(state.selected) : 0;
        const current = state.selected ? currentWinProjection(state.selected) : null;
        const currentLeader = current && currentLeaderText(state.selected, current);
        const performance = predictionPerformance(state.matches);
        const liveSources = state.sources.filter((source) => source.status !== "planned").length;
        document.getElementById("hero-confidence").textContent = pct(confidence);
        document.getElementById("hero-markets").textContent = `${marketCount} handicap markets`;
        document.getElementById("hero-sources").textContent = `${liveSources}/${state.sources.length} data sources`;
        document.getElementById("metrics").innerHTML = [
          metric("总体命中率", performance.completed ? pct(performance.hit_rate) : "-", performance.completed ? `1X2 命中 ${performance.correct}/${performance.completed} 场` : "等待完赛样本"),
          metric("单场当前胜率", currentLeader ? currentLeader.value : "-", current ? currentLeader.sub : "等待比赛选择"),
          metric("赛制覆盖", `${state.tournament?.projected_matches_total || state.matches.length} 场`, "72 场小组赛 + 32 场淘汰赛投影"),
          metric("亚洲盘口", `${marketCount} 条`, "含半赢、走盘、公平赔率"),
          metric("最高夺冠", top ? pct(top.title_probability) : "-", top ? `${top.team} · 裸模型 ${pct(top.raw_title_probability)}` : "等待模拟"),
          metric("公开市场", `${state.tournament?.title_anchor?.coverage || 0} 队`, `锚定权重 ${pct(state.tournament?.title_anchor?.weight || 0)}`)
        ].join("");
      }

      function metric(label, value, sub) {
        return `<div class="metric"><span>${label}</span><b>${value}</b><small>${sub}</small></div>`;
      }

      function renderMatchList() {
        const matches = filteredMatches();
        document.getElementById("match-count").textContent = matches.length;
        document.getElementById("match-list").innerHTML = matches.map((match) => {
          const active = state.selected && match.match_id === state.selected.match_id;
          const marketRows = match.handicap_preview.filter((row) => row.market_status === "available").length;
          return `
            <button class="match-row ${active ? "active" : ""}" data-match="${match.match_id}">
              <span class="match-meta">#${match.fixture.match_number} · ${match.fixture.group}组 · ${dateText(match.fixture.kickoff_utc)}</span>
              <span class="team-line">${team(match.home_team)}<strong>${scoreOrProbability(match, "home")}</strong></span>
              <span class="team-line">${team(match.away_team)}<strong>${scoreOrProbability(match, "away")}</strong></span>
              <span class="badges"><em class="badge">${liveLabel(match)}</em><em class="badge">${match.weather?.condition || "normal"}</em><em class="badge">${marketRows ? `${marketRows} 市场` : "模型公平盘"}</em></span>
            </button>
          `;
        }).join("");
        document.querySelectorAll("[data-match]").forEach((button) => {
          button.addEventListener("click", () => {
            state.selected = state.matches.find((match) => match.match_id === button.dataset.match);
            render();
          });
        });
      }

      function renderDetail() {
        const match = state.selected;
        document.getElementById("rail-group").textContent = `${match.fixture.group}组`;
        document.getElementById("detail").innerHTML = `
          <header class="hero">
            <div>
              <p class="eyebrow">MATCH #${match.fixture.match_number}</p>
              <h2>${match.home_team.name} <span class="muted">vs</span> ${match.away_team.name}</h2>
              <div class="venue">${dateText(match.fixture.kickoff_utc)} · ${match.fixture.venue} · ${match.fixture.city} · ${liveLabel(match)}</div>
            </div>
            <div class="score-lens">
              ${flag(match.home_team, true)}
              <div><strong>${scoreLens(match)}</strong><span class="muted">${hasActualScore(match) ? "实时/赛果" : "预期进球"}</span></div>
              ${flag(match.away_team, true)}
            </div>
          </header>
          ${livePanel(match)}
          ${probability(match)}
          <div class="tabs">
            ${tabButton("handicap", "盘口矩阵")}
            ${tabButton("advice", "投注参考")}
            ${tabButton("events", "比分事件")}
            ${tabButton("stats", "技术统计")}
            ${tabButton("model", "模型因子")}
            ${tabButton("history", "球队历史")}
            ${tabButton("matchup", "战术爆冷")}
            ${tabButton("players", "球员天气")}
          </div>
          <div id="tab-content">${tabContent(match)}</div>
        `;
        document.querySelectorAll("[data-tab]").forEach((button) => {
          button.addEventListener("click", () => {
            state.tab = button.dataset.tab;
            renderDetail();
          });
        });
      }

      function livePanel(match) {
        if (!match.live_status || match.live_status.status_state === "pre") return "";
        const live = match.live_status;
        return `
          <div class="subpanel" style="margin:14px 0">
            <span class="data-chip">${live.source || "live source"} · ${live.source_quality || "live_public"} · ${live.captured_at ? shortTime(live.captured_at) : ""}</span>
            <p class="source-note">${live.status_description || live.status_state || "-"}${live.display_clock ? ` · ${live.display_clock}` : ""}${live.attendance ? ` · attendance ${Number(live.attendance).toLocaleString()}` : ""}</p>
          </div>
        `;
      }

      function probability(match) {
        const current = currentWinProjection(match);
        return `
          <div class="prob">
            <div class="prob-labels">
              <span>赛前 ${match.home_team.name} ${pct(match.p_home)}</span>
              <span>赛前平局 ${pct(match.p_draw)}</span>
              <span>赛前 ${match.away_team.name} ${pct(match.p_away)}</span>
            </div>
            <div class="prob-bar">
              <i class="home" style="width:${Math.max(4, match.p_home * 100)}%"></i>
              <i class="draw" style="width:${Math.max(4, match.p_draw * 100)}%"></i>
              <i class="away" style="width:${Math.max(4, match.p_away * 100)}%"></i>
            </div>
            <div class="subpanel" style="margin-top:10px">
              <span class="data-chip">单场当前胜率 · ${current.label}</span>
              <div class="prob-labels" style="margin-top:10px">
                <span>${match.home_team.name} ${pct(current.home)}</span>
                <span>平局 ${pct(current.draw)}</span>
                <span>${match.away_team.name} ${pct(current.away)}</span>
              </div>
              <div class="prob-bar">
                <i class="home" style="width:${Math.max(4, current.home * 100)}%"></i>
                <i class="draw" style="width:${Math.max(4, current.draw * 100)}%"></i>
                <i class="away" style="width:${Math.max(4, current.away * 100)}%"></i>
              </div>
              <p class="source-note">${current.note}</p>
            </div>
          </div>
        `;
      }

      function tabButton(key, label) {
        return `<button class="${state.tab === key ? "active" : ""}" data-tab="${key}">${label}</button>`;
      }

      function tabContent(match) {
        if (state.tab === "advice") return advicePanel(match);
        if (state.tab === "events") return eventsPanel(match);
        if (state.tab === "stats") return technicalPanel(match);
        if (state.tab === "model") return modelPanel(match);
        if (state.tab === "history") return historyPanel(match);
        if (state.tab === "matchup") return matchupPanel(match);
        if (state.tab === "players") return playersPanel(match);
        return handicapTable(match);
      }

      function handicapTable(match) {
        return `
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>主队盘口</th><th>${match.home_team.name}</th><th>${match.away_team.name}</th><th>走盘</th><th>公平赔率</th><th>市场赔率</th><th>模型倾向</th></tr>
              </thead>
              <tbody>
                ${match.handicap_preview.map((row) => `
                  <tr>
                    <td class="mono"><strong>${line(row.line)}</strong></td>
                    <td><strong>${pct(row.home.positive_probability)}</strong><small>半赢 ${pct(row.home.half_win)} · 半输 ${pct(row.home.half_loss)}</small></td>
                    <td><strong>${pct(row.away.positive_probability)}</strong><small>半赢 ${pct(row.away.half_win)} · 半输 ${pct(row.away.half_loss)}</small></td>
                    <td>${pct(row.home.push)}</td>
                    <td><span class="mono">${odds(row.home.fair_decimal_odds)}</span><small>客 ${odds(row.away.fair_decimal_odds)}</small></td>
                    <td><span class="mono">${row.market_status === "available" ? odds(row.home.market_decimal_odds) : row.market_status === "proxy" ? "样例盘口" : "暂无市场"}</span><small>${row.market_status === "available" ? `客 ${odds(row.away.market_decimal_odds)}` : row.source} · ${row.closing_status || "closing pending"}</small></td>
                    <td><span class="lean ${row.lean === "home" ? "home-lean" : row.lean === "away" ? "away-lean" : ""}">${row.lean === "home" ? "主队" : row.lean === "away" ? "客队" : "观察"}</span></td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        `;
      }

      function advicePanel(match) {
        const rows = bettingReferences(match);
        return `
          <div class="subpanel" style="margin-bottom:10px">
            <span class="data-chip">模型投注参考 · 非投注建议</span>
            <p class="source-note">按市场类型分开展示：不让球胜平负是三结果，亚洲平手盘是平局退回，欧洲让球仍有胜/平/负三项。只展示概率、市场差异和模型倾向；不包含下注指令、仓位、Kelly 或收益承诺。</p>
          </div>
          <div class="grid">
            ${rows.map((row) => `
              <div class="subpanel">
                <div class="factor-meta">
                  <span>${row.category}</span>
                  <span>${row.source_type}</span>
                  <span class="${row.confidence === "低" ? "unused" : ""}">置信 ${row.confidence}</span>
                </div>
                <h3 style="margin-top:12px">${row.pick}</h3>
                <div class="grid" style="grid-template-columns:repeat(2,minmax(0,1fr));margin-top:10px">
                  ${tile(row.metric_a_label, row.metric_a)}
                  ${tile(row.metric_b_label, row.metric_b)}
                </div>
                <p class="source-note">${row.note}</p>
              </div>
            `).join("")}
          </div>
        `;
      }

      function bettingReferences(match) {
        return [
          oneXTwoReference(match),
          asianHandicapReference(match),
          europeanHandicapReference(match),
          polymarketHandicapReference(match),
          totalGoalsReference(match),
          scoreReference(match),
          cornersReference(match),
          cardsReference(match)
        ];
      }

      function oneXTwoReference(match) {
        const status = matchTimingNote(match);
        const market = match.market_summary?.one_x_two || {};
        const outcomes = [
          { key: "home", label: `${match.home_team.name} 胜`, probability: Number(match.p_home || 0) },
          { key: "draw", label: "平局", probability: Number(match.p_draw || 0) },
          { key: "away", label: `${match.away_team.name} 胜`, probability: Number(match.p_away || 0) }
        ];
        const byModel = [...outcomes].sort((a, b) => b.probability - a.probability);
        const byDelta = outcomes
          .map((outcome) => ({
            ...outcome,
            marketProbability: Number(market.market_probabilities?.[outcome.key] ?? NaN),
            delta: Number(market.model_delta?.[outcome.key] ?? NaN)
          }))
          .filter((outcome) => Number.isFinite(outcome.delta))
          .sort((a, b) => b.delta - a.delta);
        const marketEdge = byDelta[0];
        const pick = market.status === "available" && marketEdge && marketEdge.delta >= 0.045
          ? `模型高于市场：${marketEdge.label}`
          : byModel[0].probability >= 0.45
            ? `模型倾向：${byModel[0].label}`
            : "观察";
        const modelText = `${pct(match.p_home)} / ${pct(match.p_draw)} / ${pct(match.p_away)}`;
        const fairText = `${odds(fairOdds(match.p_home))} / ${odds(fairOdds(match.p_draw))} / ${odds(fairOdds(match.p_away))}`;
        const marketText = market.status === "available"
          ? `${pct(market.market_probabilities.home)} / ${pct(market.market_probabilities.draw)} / ${pct(market.market_probabilities.away)}`
          : fairText;
        const note = market.status === "available"
          ? `${status} 不让球胜平负是三结果市场，平局独立结算；市场为 ${market.source}，${market.books} 家去水均值，最大模型差 ${signedPct(marketEdge?.delta || 0)}。`
          : `${status} 不让球胜平负是三结果市场，平局不是退回本金；暂无真实 1X2 市场，显示模型公平赔率。`;
        return {
          category: "基础胜平负",
          source_type: market.status === "available" ? "模型 vs 1X2 市场" : "模型独立推导",
          confidence: "高",
          pick,
          metric_a_label: "模型 主/平/客",
          metric_a: modelText,
          metric_b_label: market.status === "available" ? "市场去水 主/平/客" : "公平赔率 主/平/客",
          metric_b: marketText,
          note
        };
      }

      function asianHandicapReference(match) {
        const status = matchTimingNote(match);
        const candidates = [];
        (match.handicap_preview || []).forEach((row) => {
          if (row.market_status !== "available") return;
          const homeEdge = expectedReturnFromFair(row.home?.market_decimal_odds, row.home?.fair_decimal_odds);
          const awayEdge = expectedReturnFromFair(row.away?.market_decimal_odds, row.away?.fair_decimal_odds);
          if (homeEdge !== null) {
            candidates.push({
              side: `${match.home_team.name} ${line(row.line)}`,
              edge: homeEdge,
              probability: row.home.positive_probability,
              market: row.home.market_decimal_odds,
              fair: row.home.fair_decimal_odds,
              source: row.source
            });
          }
          if (awayEdge !== null) {
            candidates.push({
              side: `${match.away_team.name} ${line(-Number(row.line))}`,
              edge: awayEdge,
              probability: row.away.positive_probability,
              market: row.away.market_decimal_odds,
              fair: row.away.fair_decimal_odds,
              source: row.source
            });
          }
        });
        candidates.sort((a, b) => b.edge - a.edge);
        const best = candidates[0];
          if (!best || best.edge < 0.035) {
          const zero = findHandicapRow(match, 0);
          return {
            category: "亚洲让球",
            source_type: candidates.length ? "博彩公司市场对比" : "模型公平盘口",
            confidence: "高",
            pick: "观察",
            metric_a_label: "AH 0 主/客",
            metric_a: zero ? `${pct(zero.home.positive_probability)} / ${pct(zero.away.positive_probability)}` : "-",
            metric_b_label: "AH 0 走盘",
            metric_b: zero ? pct(zero.home.push) : "-",
            note: `${status} 当前没有超过 +3.5% 阈值的真实亚洲盘口。注意 AH 0 是平手盘，平局退回；它不等于三结果胜平负。`
          };
        }
        return {
          category: "亚洲让球",
          source_type: "博彩公司市场对比",
          confidence: "高",
          pick: `模型高于市场：${best.side}`,
          metric_a_label: "模型 edge",
          metric_a: signed(best.edge),
          metric_b_label: "覆盖 / 公平赔率",
          metric_b: `${pct(best.probability)} / ${odds(best.fair)}`,
          note: `${status} 亚洲盘按半赢、走盘、半输精确结算；市场 ${odds(best.market)} vs 模型公平 ${odds(best.fair)} · ${best.source}`
        };
      }

      function europeanHandicapReference(match) {
        const favoriteIsHome = Number(match.p_home || 0) >= Number(match.p_away || 0);
        const favorite = favoriteIsHome ? match.home_team.name : match.away_team.name;
        const opponent = favoriteIsHome ? match.away_team.name : match.home_team.name;
        const side = favoriteIsHome ? "home" : "away";
        const oneGoalRow = findHandicapRow(match, favoriteIsHome ? -1 : 1);
        const oneAndHalfRow = findHandicapRow(match, favoriteIsHome ? -1.5 : 1.5);
        const win = Number(oneAndHalfRow?.[side]?.positive_probability || 0);
        const draw = Number(oneGoalRow?.[side]?.push || 0);
        const lose = clamp(1 - win - draw, 0, 1);
        const pick = win >= 0.45
          ? `${favorite} -1 让胜`
          : draw >= 0.25
            ? `${favorite} -1 让平观察`
            : `${opponent} 受让方向观察`;
        return {
          category: "欧洲让球胜平负",
          source_type: "模型独立推导",
          confidence: "高",
          pick,
          metric_a_label: `${favorite} -1 后`,
          metric_a: `${pct(win)} / ${pct(draw)} / ${pct(lose)}`,
          metric_b_label: "结算结构",
          metric_b: "让胜 / 让平 / 让负",
          note: `${matchTimingNote(match)} 欧洲让球是三结果市场：以 ${favorite} -1 为例，赢 2+ 球才是让胜，赢 1 球是让平，其余为让负。`
        };
      }

      function polymarketHandicapReference(match) {
        const favoriteIsHome = Number(match.p_home || 0) >= Number(match.p_away || 0);
        const favorite = favoriteIsHome ? match.home_team.name : match.away_team.name;
        const underdog = favoriteIsHome ? match.away_team.name : match.home_team.name;
        const minus15 = handicapProbability(match, favoriteIsHome ? -1.5 : 1.5, favoriteIsHome ? "home" : "away");
        const minus25 = handicapProbability(match, favoriteIsHome ? -2.5 : 2.5, favoriteIsHome ? "home" : "away");
        const plus15 = handicapProbability(match, favoriteIsHome ? -1.5 : 1.5, favoriteIsHome ? "away" : "home");
        const plus25 = handicapProbability(match, favoriteIsHome ? -2.5 : 2.5, favoriteIsHome ? "away" : "home");
        const mainPick = minus15.probability >= 0.5 ? `${favorite} -1.5` : `${underdog} +1.5`;
        const secondaryPick = minus25.probability >= 0.35 ? `${favorite} -2.5` : `${underdog} +2.5`;
        return {
          category: "Polymarket 线型参考",
          source_type: "模型独立推导",
          confidence: "中",
          pick: `${mainPick} / ${secondaryPick}`,
          metric_a_label: `${favorite} -1.5 / -2.5`,
          metric_a: `${pct(minus15.probability)} / ${pct(minus25.probability)}`,
          metric_b_label: `${underdog} +1.5 / +2.5`,
          metric_b: `${pct(plus15.probability)} / ${pct(plus25.probability)}`,
          note: `${matchTimingNote(match)} 这里只是适配 Polymarket 常见 1.5、2.5 线型；当前未读取对应合约价格，因此不是 Polymarket 定价信号。`
        };
      }

      function handicapProbability(match, homeLine, side) {
        const row = (match.handicap_preview || []).find((item) => Number(item.line) === Number(homeLine));
        return {
          probability: Number(row?.[side]?.positive_probability || 0),
          fair: row?.[side]?.fair_decimal_odds || null
        };
      }

      function scoreReference(match) {
        const scorelines = match.event_predictions?.score?.top_scorelines || match.top_scorelines || [];
        const top = scorelines[0];
        const alternatives = scorelines.slice(1, 3).map((row) => `${row.score} ${pct(row.probability)}`).join(" · ");
        return {
          category: "比分",
          source_type: "模型独立推导",
          confidence: "中",
          pick: top ? top.score : "观察",
          metric_a_label: "首选概率",
          metric_a: top ? pct(top.probability) : "-",
          metric_b_label: "备选比分",
          metric_b: alternatives || "-",
          note: `${matchTimingNote(match)} 精确比分天然波动大，建议只当比分分布参考。`
        };
      }

      function totalGoalsReference(match) {
        const market = match.market_summary?.over_under_2_5 || {};
        const over = Number(match.p_over_2_5 || 0);
        const under = clamp(1 - over, 0, 1);
        const marketOver = Number(market.market_probabilities?.over ?? NaN);
        const marketUnder = Number(market.market_probabilities?.under ?? NaN);
        const overDelta = Number(market.model_delta?.over ?? NaN);
        const underDelta = Number(market.model_delta?.under ?? NaN);
        const pick = market.status === "available" && Math.max(overDelta, underDelta) >= 0.045
          ? `模型高于市场：${overDelta >= underDelta ? "大 2.5" : "小 2.5"}`
          : over >= under ? "大 2.5" : "小 2.5";
        const confidence = Math.max(over, under);
        return {
          category: "大小球",
          source_type: market.status === "available" ? "模型 vs O/U 市场" : "模型独立推导",
          confidence: "高",
          pick: confidence >= 0.55 ? pick : "观察",
          metric_a_label: "模型 大/小 2.5",
          metric_a: `${pct(over)} / ${pct(under)}`,
          metric_b_label: market.status === "available" ? "市场去水 大/小" : "公平赔率 大/小",
          metric_b: market.status === "available" ? `${pct(marketOver)} / ${pct(marketUnder)}` : `${odds(fairOdds(over))} / ${odds(fairOdds(under))}`,
          note: market.status === "available"
            ? `${matchTimingNote(match)} 基于比分矩阵总进球分布，并与 ${market.books} 家 O/U 2.5 市场去水均值对比。`
            : `${matchTimingNote(match)} 基于比分矩阵总进球分布；未接入真实 O/U 2.5 市场 edge 时只显示模型方向。`
        };
      }

      function cornersReference(match) {
        const corners = match.event_predictions?.corners || {};
        const over85 = Number(corners.over_8_5_probability || 0);
        const over95 = Number(corners.over_9_5_probability || 0);
        let pick = "角球观察";
        if (over95 >= 0.56) pick = "角球大 9.5";
        else if (over85 >= 0.56) pick = "角球大 8.5";
        else if (over85 <= 0.44) pick = "角球小 8.5";
        return {
          category: "角球",
          source_type: "代理数据低置信",
          confidence: "低",
          pick,
          metric_a_label: "角球预测 主/客",
          metric_a: `${value(corners.home_expected, 1)} / ${value(corners.away_expected, 1)}`,
          metric_b_label: "大 8.5 / 大 9.5",
          metric_b: `${pct(over85)} / ${pct(over95)}`,
          note: `${matchTimingNote(match)} 角球来自技术统计代理和实时公开统计校验；缺少真实角球盘口与球队角球历史回测，因此低置信。`
        };
      }

      function cardsReference(match) {
        const cards = match.event_predictions?.cards || {};
        const yellow35 = Number(cards.over_3_5_yellow_probability || 0);
        const yellow45 = Number(cards.over_4_5_yellow_probability || 0);
        const red = Number(cards.any_red_probability || 0);
        let yellowPick = "黄牌观察";
        if (yellow45 >= 0.55) yellowPick = "黄牌大 4.5";
        else if (yellow35 >= 0.55) yellowPick = "黄牌大 3.5";
        else if (yellow35 <= 0.45) yellowPick = "黄牌小 3.5";
        const redPick = red >= 0.18 ? "红牌风险偏高" : red <= 0.08 ? "红牌偏低" : "红牌观察";
        return {
          category: "红黄牌",
          source_type: "代理数据低置信",
          confidence: "低",
          pick: `${yellowPick} / ${redPick}`,
          metric_a_label: "黄牌大 3.5",
          metric_a: pct(yellow35),
          metric_b_label: "出现红牌",
          metric_b: pct(red),
          note: `${matchTimingNote(match)} 黄/红牌来自透明先验和实时公开统计校验，缺少裁判尺度与真实牌市场赔率。`
        };
      }

      function expectedReturnFromFair(marketOdds, fairOdds) {
        const market = Number(marketOdds);
        const fair = Number(fairOdds);
        if (!Number.isFinite(market) || !Number.isFinite(fair) || market <= 1 || fair <= 1) return null;
        return market / fair - 1;
      }

      function tile(label, value) {
        return `<div class="tile"><span>${label}</span><strong>${value}</strong></div>`;
      }

      function value(item, digits = 1) {
        const number = Number(item);
        return Number.isFinite(number) ? number.toFixed(digits) : "-";
      }

      function actualValue(item) {
        return item === null || item === undefined ? "暂无" : item;
      }

      function fairOdds(probability) {
        const number = Number(probability);
        return Number.isFinite(number) && number > 0 ? 1 / number : null;
      }

      function signedPct(value) {
        const number = Number(value);
        if (!Number.isFinite(number)) return "-";
        return `${number >= 0 ? "+" : ""}${(number * 100).toFixed(1)}pp`;
      }

      function findHandicapRow(match, homeLine) {
        return (match.handicap_preview || []).find((item) => Number(item.line) === Number(homeLine));
      }

      function actualScore(match, score) {
        const home = match.live_status?.home_score ?? score.actual_home_score;
        const away = match.live_status?.away_score ?? score.actual_away_score;
        return home === null || home === undefined || away === null || away === undefined ? "未开赛" : `${home} : ${away}`;
      }

      function currentWinProjection(match) {
        const live = match.live_status;
        if (!hasActualScore(match)) {
          return {
            home: match.p_home,
            draw: match.p_draw,
            away: match.p_away,
            label: "赛前模型",
            note: "未开赛时当前胜率等同于赛前胜平负概率。"
          };
        }
        const homeScore = Number(live.home_score);
        const awayScore = Number(live.away_score);
        if (live.completed || live.status_state === "post") {
          return finalWinProjection(homeScore, awayScore);
        }
        if (live.status_state !== "in") {
          return {
            home: match.p_home,
            draw: match.p_draw,
            away: match.p_away,
            label: "赛前模型",
            note: "当前状态不是进行中，暂用赛前胜平负概率。"
          };
        }
        const elapsed = liveMinute(live);
        const remainingShare = clamp((98 - elapsed) / 98, 0, 1);
        const homeLambda = Math.max(0.01, Number(match.lambda_home || 0) * remainingShare);
        const awayLambda = Math.max(0.01, Number(match.lambda_away || 0) * remainingShare);
        const distribution = remainingOutcomeProjection(homeScore, awayScore, homeLambda, awayLambda);
        return {
          ...distribution,
          label: `实时 ${Math.round(elapsed)}'`,
          note: `基于当前比分 ${homeScore}:${awayScore}、比赛时间和剩余预期进球估算；不是投注建议。`
        };
      }

      function predictionPerformance(matches) {
        const rows = matches
          .map((match) => {
            const actual = actualOutcome(match);
            if (!actual) return null;
            return { actual, predicted: predictedOutcome(match) };
          })
          .filter(Boolean);
        const correct = rows.filter((row) => row.actual === row.predicted).length;
        return {
          completed: rows.length,
          correct,
          hit_rate: rows.length ? correct / rows.length : null
        };
      }

      function actualOutcome(match) {
        const live = match.live_status;
        if (!live || !(live.completed || live.status_state === "post") || !hasActualScore(match)) return null;
        const home = Number(live.home_score);
        const away = Number(live.away_score);
        if (home > away) return "home";
        if (home < away) return "away";
        return "draw";
      }

      function predictedOutcome(match) {
        const rows = [
          { outcome: "home", probability: Number(match.p_home || 0) },
          { outcome: "draw", probability: Number(match.p_draw || 0) },
          { outcome: "away", probability: Number(match.p_away || 0) }
        ].sort((a, b) => b.probability - a.probability);
        return rows[0].outcome;
      }

      function currentLeaderText(match, current) {
        const rows = [
          { label: match.home_team.name, probability: current.home },
          { label: "平局", probability: current.draw },
          { label: match.away_team.name, probability: current.away }
        ].sort((a, b) => b.probability - a.probability);
        return {
          value: `${rows[0].label} ${pct(rows[0].probability)}`,
          sub: current.label
        };
      }

      function finalWinProjection(homeScore, awayScore) {
        if (homeScore > awayScore) return { home: 1, draw: 0, away: 0, label: "完赛", note: "比赛已结束，当前胜率等同于赛果。" };
        if (homeScore < awayScore) return { home: 0, draw: 0, away: 1, label: "完赛", note: "比赛已结束，当前胜率等同于赛果。" };
        return { home: 0, draw: 1, away: 0, label: "完赛", note: "比赛已结束，当前胜率等同于赛果。" };
      }

      function remainingOutcomeProjection(homeScore, awayScore, homeLambda, awayLambda) {
        const maxExtraGoals = 7;
        const homePmfs = poissonDistribution(homeLambda, maxExtraGoals);
        const awayPmfs = poissonDistribution(awayLambda, maxExtraGoals);
        let home = 0;
        let draw = 0;
        let away = 0;
        for (let h = 0; h < homePmfs.length; h += 1) {
          for (let a = 0; a < awayPmfs.length; a += 1) {
            const probability = homePmfs[h] * awayPmfs[a];
            const finalHome = homeScore + h;
            const finalAway = awayScore + a;
            if (finalHome > finalAway) home += probability;
            else if (finalHome === finalAway) draw += probability;
            else away += probability;
          }
        }
        const total = Math.max(0.000001, home + draw + away);
        return { home: home / total, draw: draw / total, away: away / total };
      }

      function poissonDistribution(lambda, maxGoals) {
        const values = [];
        let probability = Math.exp(-lambda);
        let total = 0;
        for (let goals = 0; goals <= maxGoals; goals += 1) {
          if (goals > 0) probability *= lambda / goals;
          values.push(probability);
          total += probability;
        }
        return values.map((value) => value / total);
      }

      function liveMinute(live) {
        const clock = String(live.display_clock || "");
        const match = clock.match(/(\d+)/);
        if (match) return clamp(Number(match[1]), 0, 98);
        if (Number(live.period) >= 2) return 75;
        if (Number(live.period) === 1) return 30;
        return 45;
      }

      function clamp(value, low, high) {
        return Math.max(low, Math.min(high, value));
      }

      function fatigueText(value) {
        if (value === "very_high") return "极高";
        if (value === "high") return "高";
        if (value === "medium") return "中";
        return "低";
      }

      function scoreOrProbability(match, side) {
        if (match.live_status && match.live_status[`${side}_score`] !== null && match.live_status[`${side}_score`] !== undefined) {
          return match.live_status[`${side}_score`];
        }
        return pct(side === "home" ? match.p_home : match.p_away);
      }

      function scoreLens(match) {
        if (hasActualScore(match)) {
          return `${match.live_status.home_score} : ${match.live_status.away_score}`;
        }
        return `${match.lambda_home.toFixed(2)} : ${match.lambda_away.toFixed(2)}`;
      }

      function hasActualScore(match) {
        return match.live_status && match.live_status.home_score !== null && match.live_status.home_score !== undefined && match.live_status.away_score !== null && match.live_status.away_score !== undefined;
      }

      function liveLabel(match) {
        const live = match.live_status;
        if (!live) return "模型赛前";
        if (live.completed) return "FT";
        if (live.status_state === "in") return `LIVE ${live.display_clock || ""}`.trim();
        if (live.status_state === "pre") return "赛前";
        return live.status_description || live.status_state || "赛程";
      }

      function renderTournament() {
        const teams = state.tournament?.teams || [];
        const anchor = state.tournament?.title_anchor;
        document.getElementById("sim-count").textContent = `${state.tournament?.projected_matches_total || 104} match path`;
        const titleRows = teams.slice(0, 10).map((item, index) => `
          <div class="title-row">
            <span class="muted">${index + 1}</span>
            ${flag({ flag_code: item.flag_code, name: item.team })}
            <div class="title-team">
              <strong>${item.team}</strong>
              <em>最终 ${pct(item.title_probability)} · MC裸模型 ${pct(item.raw_title_probability)} · 四强 ${pct(item.reach_sf)} · 决赛 ${pct(item.reach_final)}${item.market_probability == null ? " · 暂无市场" : ` · 市场 ${pct(item.market_probability)}`}${item.model_market_delta == null ? "" : ` · 裸差 ${signed(item.model_market_delta)}`}</em>
            </div>
            <div class="mini"><i style="width:${Math.max(2, item.title_probability * 100)}%"></i></div>
            <span class="mono">${pct(item.title_probability)}</span>
          </div>
        `).join("");
        const bracket = bracketBoard(state.tournament?.bracket);
        document.getElementById("tournament").innerHTML = `
          <div class="subpanel" style="margin:12px">
            <span class="data-chip">${anchor?.source || "market"} · 覆盖 ${anchor?.coverage || 0} 队 · 锚定 ${pct(anchor?.weight || 0)}</span>
            <p class="source-note">${state.tournament?.data_quality || ""} · Monte Carlo ${Number(state.tournament?.monte_carlo?.n_simulations || 0).toLocaleString()} 次 · seed ${state.tournament?.monte_carlo?.seed || "-"}</p>
          </div>
          ${titleRows}
          ${goalScale(state.tournament?.goal_scale_sanity)}
          ${marketValidation(state.tournament?.market_validation)}
          ${bracket}
        `;
      }

      function goalScale(goalScale) {
        if (!goalScale) return "";
        return `
          <div class="subpanel" style="margin:12px">
            <span class="data-chip">进球尺度 ${goalScale.average_goals_per_match} 球/场 · 预计总进球 ${goalScale.estimated_tournament_goals}</span>
            <p class="source-note">金靴 sanity band ${goalScale.golden_boot_goal_band} 球 · ${goalScale.status}</p>
          </div>
        `;
      }

      function marketValidation(validation) {
        if (!validation) return "";
        return `
          <div class="subpanel" style="margin:12px">
            <span class="data-chip">盘口闭盘验证：${validation.true_market_line_status}</span>
            <p class="source-note">legal AH ${validation.legal_asian_handicap_rows || 0} · proxy AH ${validation.proxy_asian_handicap_rows || 0} · closing ${validation.closing_line_status} · CLV ${validation.clv_status}</p>
          </div>
        `;
      }

      function bracketBoard(bracket) {
        if (!bracket?.rounds?.length) return "";
        const rounds = bracket.rounds.filter((round) => ["R32", "R16", "QF", "SF", "Final"].includes(round.round));
        return `
          <div class="bracket-board">
            <div class="subpanel">
              <span class="data-chip">路径冠军：${bracket.champion?.team || "-"}</span>
              <p class="source-note">${bracket.source || ""}</p>
            </div>
            ${rounds.map((round) => `
              <div class="bracket-round">
                <h3>${round.label}</h3>
                ${round.matches.slice(0, round.round === "R32" ? 4 : 8).map((match) => `
                  <div class="path-row">
                    <span class="mono">#${match.match_number}</span>
                    <strong>${match.home.team}</strong>
                    <span class="muted">vs</span>
                    <strong>${match.away.team}</strong>
                    <span class="mono">${pct(match.winner_probability)}</span>
                  </div>
                `).join("")}
              </div>
            `).join("")}
          </div>
        `;
      }

      function renderSources() {
        document.getElementById("source-count").textContent = `${state.sources.length} sources`;
        document.getElementById("sources").innerHTML = state.sources.map((source) => `
          <div class="source">
            <div><strong>${source.source}</strong><span>${source.purpose} · ${source.freshness || "unknown freshness"}</span></div>
            <em>${source.status}</em>
          </div>
        `).join("");
      }

      function confidenceScore(match) {
        const marketShare = match.handicap_preview.filter((row) => row.market_status === "available").length / Math.max(1, match.handicap_preview.length);
        const realFactors = match.factor_breakdown.filter((factor) => factor.used_in_model && factor.data_quality !== "proxy").length / Math.max(1, match.factor_breakdown.length);
        const proxyPenalty = match.factor_breakdown.some((factor) => !factor.used_in_model) ? 0.05 : 0;
        const injuryPenalty = Math.min(0.12, match.home_team.injury_impact + match.away_team.injury_impact);
        return Math.max(0.45, Math.min(0.91, 0.58 + marketShare * 0.18 + realFactors * 0.16 - proxyPenalty - injuryPenalty));
      }

      function shortTime(value) {
        try {
          return new Date(value).toLocaleString("zh-CN", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
        } catch (_error) {
          return value;
        }
      }

      boot();
    </script>
  </body>
</html>
