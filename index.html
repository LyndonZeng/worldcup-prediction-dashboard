<!doctype html><html lang='zh-CN'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>2026 世界杯预测看板</title><style>:root{--bg:#03060b;--panel:rgba(9,18,30,.84);--line:rgba(180,220,255,.22);--text:#f7fbff;--muted:#91a6bc;--blue:#67b7ff;--green:#25e0a0;--gold:#ffd35a;--red:#ff6b7f}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 18% 0,rgba(103,183,255,.26),transparent 32%),radial-gradient(circle at 84% 6%,rgba(37,224,160,.18),transparent 30%),repeating-linear-gradient(90deg,rgba(255,255,255,.045) 0 1px,transparent 1px 92px),linear-gradient(180deg,#02050a,#07111b);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif}.shell{max-width:1480px;margin:auto;padding:20px}.hero,.panel,.match,.tile,.card{border:1px solid var(--line);border-radius:14px;background:var(--panel);box-shadow:0 28px 80px rgba(0,0,0,.38);backdrop-filter:blur(18px)}.hero{min-height:250px;padding:24px;display:grid;grid-template-columns:1fr 360px;gap:18px;background:linear-gradient(135deg,rgba(8,20,34,.95),rgba(4,11,19,.9)),linear-gradient(110deg,rgba(255,211,90,.28),transparent 42%,rgba(103,183,255,.2))}.brand{display:flex;gap:16px;align-items:center}.mark{width:66px;height:66px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(145deg,var(--gold),var(--green));color:#041018;font-weight:950;font-size:22px}.eyebrow{color:var(--gold);font-weight:900;font-size:12px;letter-spacing:.08em}h1{margin:8px 0 10px;font-size:clamp(38px,6vw,78px);line-height:.94}h2,h3,p{margin:0}.copy,.muted{color:var(--muted);line-height:1.65}.heroStat{padding:18px}.heroStat b{display:block;font-size:34px;margin-top:8px}.metrics,.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.metrics{margin:14px 0}.tile{min-height:88px;padding:13px}.tile span{display:block;color:var(--muted);font-size:13px}.tile b{display:block;margin-top:7px;font-size:24px}.layout{display:grid;grid-template-columns:310 ><i class='away' style='width:${m.p[2]*100}%'></i></div><div class='grid'>${tile('主胜',pct(m.p[0]),m.h)}${tile('平局',pct(m.p[1]),'draw')}${tile('客胜',pct(m.p[2]),m.a)}${tile('大2.5',pct(m.p[3]),'总进球')}${tile('主队修正',mu(m.mi[0]),'进球倍率')}${tile('客队修正',mu(m.mi[1]),'进球倍率')}${tile('总进球修正',mu(m.mi[2]),'节奏/环境')}${tile('综合边际',sg(m.mi[3]),'因子加权')}</div><div class='tabs'><button class='${tab==='handicap'?'on':''}' data-tab='handicap'>盘口矩阵</button><button class='${tab==='stats'?'on':''}' data-tab='stats'>技术统计</button><button class='${tab==='players'?'on':''}' data-tab='players'>球员天气</button></div>${tabContent(m)}`}function tabContent(m){if(tab==='stats')return stats(m);if(tab==='players')return players(m);return `<div class='table'><table><thead><tr><th>主队盘口</th><th>主队覆盖</th><th>客队覆盖</th><th>走盘</th><th>公平赔率</th><th>市场</th><th>模型倾向</th></tr></thead><tbody>${m.hc.map(r=>`<tr><td><b>${r[0]>0?'+'+r[0]:r[0]}</b></td><td>${pct(r[1])}</td><td>${pct(r[2])}</td><td>${pct(r[3])}</td><td>${od(r[4])} / ${od(r[5])}</td><td>${r[6]?od(r[6])+' / '+od(r[7]):'<span class=muted>暂无</span>'}</td><td><span class='tag'>${r[8]}</span></td></tr>`).join('')}</tbody></table></div>`}function stats(m){const block=(name,p,fc)=>`<div class='card'><h3><img class='flag' src='${fl(fc)}'> ${name}</h3><div class='grid'>${tile('控球率',p[0].toFixed(1)+'%','possession')}${tile('射门',p[1].toFixed(1),'shots')}${tile('射正',p[2].toFixed(1),'SOT')}${tile('xG/xGA',p[3]+'/'+p[4],'process')}${tile('PPDA',p[5],'press')}${tile('旅程',p[6]+'km',p[7])}</div></div>`;return `<div class='two'>${block(m.h,m.stats[0],m.hf)}${block(m.a,m.stats[1],m.af)}</div>`}function players(m){return `<div class='two'><div class='card'><h3>${m.h} · ${m.pl[0]}</h3><p class='muted'>${m.pl[1]}/11 首发可用，分钟负荷进入进球倍率修正。</p></div><div class='card'><h3>${m.a} · ${m.pl[2]}</h3><p class='muted'>${m.pl[3]}/11 首发可用，关键球员状态进入盘口置信度。</p></div></div><div class='card' style='margin-top:10px'><h3>天气与场地</h3><div class='weather'><span>温度 <b>${m.w[0]}°C</b></span><span>湿度 <b>${m.w
