function markets(m){let h=0,d=0,a=0,over=0,btts=0;for(let i=0;i<m.length;i++)for(let j=0;j<m[i].length;j++){let p=m[i][j];if(i>j)h+=p;else if(i===j)d+=p;else a+=p;if(i+j>=3)over+=p;if(i&&j)btts+=p}return {home:h,draw:d,away:a,over,btts}}
function split(line){let q=Math.round(line*4);return q%2===0?[line]:q>0?[(q-1)/4,(q+1)/4]:[(q+1)/4,(q-1)/4]}
function settle(margin,line){let bits=split(line).map(l=>margin+l>0?'w':margin+l===0?'p':'l'),o={win:0,halfWin:0,push:0,halfLoss:0,loss:0};if(bits.length===1){o[bits[0]==='w'?'win':bits[0]==='p'?'push':'loss']=1;return o}let w=bits.filter(x=>x==='w').length,p=bits.filter(x=>x==='p').length,l=bits.filter(x=>x==='l').length;if(w===2)o.win=1;else if(l===2)o.loss=1;else if(p===2)o.push=1;else if(w&&p)o.halfWin=1;else if(l&&p)o.halfLoss=1;else{o.win=.5;o.loss=.5}return o}
function ah(m,line,home=true){let out={win:0,halfWin:0,push:0,halfLoss:0,loss:0};for(let i=0;i<m.length;i++)for(let j=0;j<m[i].length;j++){let s=settle(home?i-j:j-i,home?line:-line),p=m[i][j];for(let k in out)out[k]+=s[k]*p}return out}
function fair(o){let gain=o.win+.5*o.halfWin,loss=o.loss+.5*o.halfLoss;return gain<=.001?99:1+loss/gain}
function handicapRows(m,idx){return [-1.5,-1.25,-1,-.75,-.5,-.25,0,.25,.5,.75,1,1.25,1.5].map(line=>{let h=ah(m,line,true),a=ah(m,line,false),fh=fair(h),fa=fair(a),sample=Math.abs(line)<=.75;let mh=sample?clamp(fh*(1+.055*Math.sin(idx+line*5)),1.72,2.35):null,ma=sample?clamp(fa*(1-.045*Math.cos(idx+line*4)),1.72,2.35):null;return {line,h,a,fh,fa,mh,ma}})}
function stats(t){let travel=t.id==='mex'?1400:t.id==='usa'?1800:t.id==='can'?2200:5600+Math.max(0,1700-t.elo)*3;return {gf:clamp(13.2+t.attack*42+t.form*9,5.5,29),ga:clamp(10.8-t.defence*34+t.injury*240,4.5,23),xgf:clamp(1.35+t.attack*2.4+t.form*.5,.75,2.35),xga:clamp(1.18-t.defence*2+t.injury*18,.65,2.2),pos:clamp(50+t.attack*42+t.defence*12+t.form*28,38,67),shots:clamp(10.8+t.attack*20+t.form*7,7.2,16.8),ppda:clamp(12.8-t.defence*28-t.form*10-t.attack*6,6.5,18),travel}}
function enrich(f,i){let x=xg(f),m=matrix(x[0],x[1]);return {...f,i,x,m,p:markets(m),hc:handicapRows(m,i),fx:factors(f)}}
const matches=fixtures.map(enrich);
function titleTable(){let vals=teams.map(t=>({t,s:strength(t)})),sum=vals.reduce((a,x)=>a+x.s**6,0),sum5=vals.reduce((a,x)=>a+x.s**5,0);return vals.map(x=>({t:x.t,title:x.s**6/sum,final:Math.min(.62,x.s**5/sum5*2)})).sort((a,b)=>b.title-a.title)}
function confidence(m){let market=m.hc.filter(r=>r.mh).length/m.hc.length,inj=Math.min(.14,m.home.injury+m.away.injury);return clamp(.63+market*.22-inj,.45,.91)}
function metric(a,b,c){return `<div class='metric'><span>${a}</span><b>${b}</b><small class='muted'>${c}</small></div>`}
function tile(a,b,c=''){return `<div class='tile'><span>${a}</span><b>${b}</b><small class='muted'>${c}</small></div>`}
function filtered(){let q=query.toLowerCase();return matches.filter(x=>(group==='ALL'||x.group===group)&&(!q||x.home.name.toLowerCase().includes(q)||x.away.name.toLowerCase().includes(q)||x.city.toLowerCase().includes(q)||x.group.toLowerCase().includes(q)))}
function renderGroups(){let gs=['ALL',...new Set(teams.map(t=>t.group))];$('groups').innerHTML=gs.map(g=>`<button class='${group===g?'on':''}' data-g='${g}'>${g==='ALL'?'全部':g+'组'}</button>`).join('')}
function render(){renderGroups();let top=titleTable()[0],cur=matches[selected];$('modelName').textContent=MODEL;$('metrics').innerHTML=[metric('小组赛覆盖','72 场','48 队 · 12 组 · 完整小组赛'),metric('亚洲盘口','936 条','每场 13 条盘口线，含走盘/半赢'),metric('最高夺冠',pct(top.title),top.t.name),metric('当前置信度',pct(confidence(cur)),'市场、伤病、天气完整度估计')].join('');let fs=filtered();$('matchCount').textContent=fs.length+' 场';$('list').innerHTML=fs.map(x=>`<button class='match ${x.i===selected?'on':''}' data-m='${x.i}'><span class='muted'>#${x.i+1} · ${x.group}组 · ${x.city}</span><span class='row'><span class='team'><img class='flag' src='${flag(x.home.flag)}'>${x.home.name}</span><b>${pct(x.p.home)}</b></span><span class='row'><span class='team'><img class='flag' src='${flag(x.away.flag)}'>${x.away.name}</span><b>${pct(x.p.away)}</b></span><span class='muted'>xG ${fmt(x.x[0])}:${fmt(x.x[1])}</span></button>`).join('');$('detail').innerHTML=detail(cur);$('rail').innerHTML=cur.fx.map(f=>`<div class='factor'><b>${f[0]}</b><div class='bar'><i style='width:${Math.max(3,Math.abs(f[1])*100)}%'></i></div><span class='mono'>${signed(f[1])}</span></div>`).join('');renderTitles();renderSources()}
function detail(m){return `<div class='score'><img class='flag' style='width:62px;height:42px' src='${flag(m.home.flag)}'><div><div class='eyebrow'>MATCH #${m.i+1} · ${m.venue} · ${m.city}</div><h2>${m.home.name} <span class='muted'>vs</span> ${m.away.name}</h2><strong>${fmt(m.x[0])} : ${fmt(m.x[1])}</strong><p class='muted'>预期进球</p></div><img class='flag' style='width:62px;height:42px' src='${flag(m.away.flag)}'></div><div class='prob'><i class='home' style='width:${m.p.home*100}%'></i><i class='draw' style='width:${m.p.draw*100}%'></i><i class='away' style='width:${m.p.away*100}%'></i></div><div class='grid'>${tile('主胜',pct(m.p.home),m.home.name)}${tile('平局',pct(m.p.draw),'draw')}${tile('客胜',pct(m.p.away),m.away.name)}${tile('大 2.5',pct(m.p.over),'总进球')}</div><div class='tabs'><button class='${tab==='handicap'?'on':''}' data-tab='handicap'>盘口矩阵</button><button class='${tab==='stats'?'on':''}' data-tab='stats'>技术统计</button><button class='${tab==='players'?'on':''}' data-tab='players'>球员天气</button><button class='${tab==='model'?'on':''}' data-tab='model'>模型输入</button></div>${tabContent(m)}`}
function tabContent(m){if(tab==='stats')return statsTab(m);if(tab==='players')return playersTab(m);if(tab==='model')return `<div class='grid'>${tile('主队 ELO',m.home.elo,m.home.name)}${tile('客队 ELO',m.away.elo,m.away.name)}${tile('主队进攻',signed(m.home.attack),'seed rating')}${tile('客队进攻',signed(m.away.attack),'seed rating')}${tile('主队伤病',pct(m.home.injury),'availability proxy')}${tile('客队伤病',pct(m.away.injury),'availability proxy')}${tile('模型边际',signed(m.fx.reduce((s,f)=>s+f[1]*f[2],0)),'weighted factors')}${tile('公开边界','非投注建议','information only')}</div>`;return `<div class='table'><table><thead><tr><th>主队盘口</th><th>${m.home.name} 覆盖</th><th>${m.away.name} 覆盖</th><th>走盘</th><th>公平赔率</th><th>市场样例</th><th>模型倾向</th></tr></thead><tbody>${m.hc.map(r=>{let lean='观察';if(r.mh&&r.mh>r.fh*1.055)lean=m.home.name;if(r.ma&&r.ma>r.fa*1.055)lean=m.away.name;return `<tr><td class='mono'><b>${r.line>0?'+'+r.line:r.line}</b></td><td>${pct(r.h.win)}<small class='muted'>半赢 ${pct(r.h.halfWin)} · 半输 ${pct(r.h.halfLoss)}</small></td><td>${pct(r.a.win)}<small class='muted'>半赢 ${pct(r.a.halfWin)} · 半输 ${pct(r.a.halfLoss)}</small></td><td>${pct(r.h.push)}</td><td>${fmt(r.fh)} / ${fmt(r.fa)}</td><td>${r.mh?fmt(r.mh)+' / '+fmt(r.ma):'<span class=muted>模型公平盘</span>'}</td><td><span class='tag'>${lean}</span></td></tr>`}).join('')}</tbody></table></div>`}
function statsTab(m){let block=(t,s)=>`<div class='sub'><h3><img class='flag' src='${flag(t.flag)}'> ${t.name}</h3><div class='grid'>${tile('近18月进球',s.gf.toFixed(1),'proxy')}${tile('近18月失球',s.ga.toFixed(1),'proxy')}${tile('控球率',s.pos.toFixed(1)+'%','possession')}${tile('射门',s.shots.toFixed(1),'per match')}${tile('xG / xGA',s.xgf.toFixed(2)+' / '+s.xga.toFixed(2),'process')}${tile('PPDA',s.ppda.toFixed(1),'press')}${tile('旅程',Math.round(s.travel)+'km',s.travel>7600?'极高':s.travel>6000?'高':s.travel>3800?'中':'低')}${tile('阵容深度',clamp(58+(t.elo-1600)/9+t.form*45-t.injury*360,36,92).toFixed(1),'proxy')}</div></div>`;return `<div class='two'>${block(m.home,stats(m.home))}${block(m.away,stats(m.away))}</div>`}
function playersTab(m){let w=weather(m),block=t=>`<div class='sub'><h3>${t.name} · ${t.injury>=.025?'偏高':t.injury>=.015?'中等':'低风险'}</h3><p class='muted'>预计可用首发 ${Math.max(8,Math.min(11,Math.round(11-t.injury*70)))}/11</p>${(players[t.id]||[t.code+' FW',t.code+' MID',t.code+' CB']).map((p,i)=>`<p>${p} <span class='muted'>${['attack','control','defence'][i]}</span></p>`).join('')}</div>`;return `<div class='two'>${block(m.home)}${block(m.away)}</div><div class='sub' style='margin-top:10px'><h3>天气与场地</h3><div class='weather'><span>温度 <b>${w[0]}°C</b></span><span>湿度 <b>${w[1]}%</b></span><span>风速 <b>${w[2]} km/h</b></span><span>场地 <b>${w[3]}</b></span></div><p class='muted warn'>天气为 Open-Meteo 预测窗口前的城市气候代理值，实时 forecast 接入后自动替换。</p></div>`}
function renderTitles(){let rows=titleTable().slice(0,14);$('titles').innerHTML=rows.map((r,i)=>`<div class='titleRow'><div class='rank'>${i+1}</div><div class='titleTeam'><b><img class='flag' src='${flag(r.t.flag)}'> ${r.t.name}</b><div class='mini'><i style='width:${Math.max(2,r.title*100)}%'></i></div><span class='titleMeta'>${r.t.group}组 · 进决赛 ${pct(r.final)}</span></div><span class='mono'>${pct(r.title)}</span></div>`).join('')}
function renderSources(){let src=['FIFA/public schedule seed · 48 teams and 72 group fixtures','football-data.org · pending API key for scores','martj42 international_results · historical backfill adapter','StatsBomb/Opta schema · shots, possession, PPDA, xG','Open-Meteo · forecast window weather feed','Lineup/injury feed · player availability schema','Polymarket Gamma · market price adapter','The Odds API/TheStatsAPI · legal sportsbook odds'];$('sources').innerHTML=src.map(s=>{let p=s.split(' · ');return `<div class='src'><b>${p[0]}</b><p class='muted'>${p[1]}</p></div>`}).join('')}
document.addEventListener('click',e=>{let m=e.target.closest('[data-m]');if(m){selected=+m.dataset.m;render()}let g=e.target.closest('[data-g]');if(g){group=g.dataset.g;render()}let t=e.target.closest('[data-tab]');if(t){tab=t.dataset.tab;render()}});
$('q').addEventListener('input',e=>{query=e.target.value;render()});
render();
</script>
</body>
</html>
