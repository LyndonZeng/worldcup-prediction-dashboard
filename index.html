it(line).length;else out.loss+=1/split(line).length}if(out.win&&out.loss){out.half=out.win;out.win=0;out.loss=0}return out}function ah(m,line,home=true){let r={pos:0,half:0,push:0,loss:0};for(let i=0;i<m.length;i++)for(let j=0;j<m[i].length;j++){let b=bucket(home?i-j:j-i,home?line:-line),p=m[i][j];r.pos+=b.win*p;r.half+=b.half*p;r.push+=b.push*p;r.loss+=b.loss*p}return r}function handicapRows(m){return [-1.5,-1,-.75,-.5,-.25,0,.25,.5,.75,1,1.5].map(l=>{let h=ah(m,l,true),a=ah(m,l,false);let has=[-.75,-.5,-.25,0,.25,.5,.75].includes(l);return {l,h,a,fh:1/Math.max(.01,h.pos+h.half*.5),fa:1/Math.max(.01,a.pos+a.half*.5),mh:has?clamp(1.91+(Math.abs(l)-.5)*.18,1.72,2.16):null,ma:has?clamp(1.93-(Math.abs(l)-.5)*.12,1.72,2.16):null}})}function stats(t,f){let travel=t[0]==='mex'?1400:t[0]==='usa'?1800:t[0]==='can'?2200:5600+Math.max(0,1700-t[4])*3;return {gf:clamp(13.2+t[5]*42+t[7]*9,5.5,29),ga:clamp(10.8-t[6]*34+t[8]*24,4.5,23),xgf:clamp(1.35+t[5]*2.4+t[7]*.5,.75,2.35),xga:clamp(1.18-t[6]*2+t[8]*1.8,.65,2.2),pos:clamp(50+t[5]*42+t[6]*12+t[7]*28,38,67),shots:clamp(10.8+t[5]*20+t[7]*7,7.2,16.8),sot:0,ppda:clamp(12.8-t[6]*28-t[7]*10-t[5]*6,6.5,18),travel};}function weather(f){return CITY[f[3]]||[24,58,10,'normal']}function factors(f){let h=by[f[1]],a=by[f[2]],c=ctx(f,h,a),proc=(strength(h)-strength(a))/2.4;return [['ELO strength',clamp((h[4]-a[4])/240,-1,1),.22],['Process stats',clamp(proc/100,-1,1),.20],['Attack quality',clamp((h[5]-a[5])*4,-1,1),.15],['Defensive control',clamp((h[6]-a[6])*4,-1,1),.14],['Recent form',clamp((h[7]-a[7])*3,-1,1),.10],['Player availability',clamp((a[8]-h[8])*12,-1,1),.10],['Weather / travel',clamp((c[0]-c[1])*3,-1,1),.09]]}function enrich(f,i){let e=xg(f),m=matrix(e[0],e[1]),p=markets(m);return {i,f,h:by[f[1]],a:by[f[2]],x:e,m,p,hc:handicapRows(m),fx:factors(f)}}const matches=F.map(enrich);function titleTable(){let vals=T.map(t=>({t,s:strength(t)})),sum=vals.reduce((a,x)=>a+x.s**6,0),sum5=vals.reduce((a,x)=>a+x.s**5,0);return vals.map(x=>({t:x.t,title:x.s**6/sum,final:Math.min(.62,x.s**5/sum5*2)})).sort((a,b)=>b.title-a.title)}function groups(){let gs=['ALL',...new Set(T.map(t=>t[2]))];$('groups').innerHTML=gs.map(g=>`<button class="${group===g?'on':''}" data-g="${g}">${g==='ALL'?'全部':g+'组'}</button>`).join('')}function metric(a,b,c){return `<div class="metric"><span>${a}</span><b>${b}</b><small class="muted">${c}</small></div>`}function tile(a,b,c=''){return `<div class="tile"><span>${a}</span><b>${b}</b><small class="muted">${c}</small></div>`}function filtered(){let q=query.toLowerCase();return matches.filter(x=>(group==='ALL'||x.f[0]===group)&&(!q||x.h[1].toLowerCase().includes(q)||x.a[1].toLowerCase().includes(q)||x.f[3].toLowerCase().includes(q)||x.f[0].toLowerCase().includes(q)))}function render(){groups();let top=titleTable()[0],cur=matches[selected];$('modelName').textContent=MODEL;$('metrics').innerHTML=[metric('小组赛覆盖','72 场','48 队 · 12 组 · 完整小组赛'),metric('亚洲盘口','792 条','每场 11 条盘口线，含走盘/半赢'),metric('最高夺冠',pct(top.title),top.t[1]),metric('当前置信度',pct(confidence(cur)),'市场、伤病、天气完整度估计')].join('');let fs=filtered();$('matchCount').textContent=fs.length+' 场';$('list').innerHTML=fs.map(x=>`<button class="match ${x.i===selected?'on':''}" data-m="${x.i}"><span class="muted">#${x.i+1} · ${x.f[0]}组 · ${x.f[3]}</span><span class="row"><span class="team"><img class="flag" src="${flag(x.h[4])}">${x.h[1]}</span><b>${pct(x.p[0])}</b></span><span class="row"><span class="team"><img class="flag" src="${flag(x.a[4])}">${x.a[1]}</span><b>${pct(x.p[2])}</b></span><span class="muted">xG ${fmt(x.x[0])}:${fmt(x.x[1])}</span></button>`).join('');$('detail').innerHTML=detail(cur);$('rail').innerHTML=cur.fx.map(f=>`<div class="factor"><b>${f[0]}</b><div class="bar"><i style="width:${Math.max(3,Math.abs(f[1])*100)}%"></i></div><span class="mono">${signed(f[1])}</span></div>`).join('');renderTitles();renderSources()}function confidence(m){let market=m.hc.filter(r=>r.mh).length/m.hc.length,inj=Math.min(.14,m.h[9]+m.a[9]);return clamp(.63+market*.22-inj,.45,.91)}function detail(m){return `<div class="score"><img class="flag" style="width:62px;height:42px" src="${flag(m.h[4])}"><div><div class="eyebrow">MATCH #${m.i+1} · ${m.f[4]} · ${m.f[3]}</div><h2>${m.h[1]} <span class="muted">vs</span> ${m.a[1]}</h2><strong>${fmt(m.x[0])} : ${fmt(m.x[1])}</strong><p class="muted">预期进球</p></div><img class="flag" style="width:62px;height:42px" src="${flag(m.a[4])}"></div><div class="prob"><i class="home" style="width:${m.p[0]*100}%"></i><i class="draw" style="width:${m.p[1]*100}%"></i><i class="away" style="width:${m.p[2]*100}%"></i></div><div class="grid">${tile('主胜',pct(m.p[0]),m.h[1])}${tile('平局',pct(m.p[1]),'draw')}${tile('客胜',pct(m.p[2]),m.a[1])}${tile('大 2.5',pct(m.p[3]),'总进球')}</div><div class="tabs"><button class="${tab==='handicap'?'on':''}" data-tab="handicap">盘口矩阵</button><button class="${tab==='stats'?'on':''}" data-tab="stats">技术统计</button><button class="${tab==='players'?'on':''}" data-tab="players">球员天气</button><button class="${tab==='model'?'on':''}" data-tab="model">模型输入</button></div>${tabContent(m)}`}function tabContent(m){if(tab==='stats')return statsTab(m);if(tab==='players')return playersTab(m);if(tab==='model')return `<div class="grid">${tile('主队 ELO',m.h[5],m.h[1])}${tile('客队 ELO',m.a[5],m.a[1])}${tile('主队进攻',signed(m.h[6]),'seed rating')}${tile('客队进攻',signed(m.a[6]),'seed rating')}${tile('主队伤病',pct(m.h[9]),'availability proxy')}${tile('客队伤病',pct(m.a[9]),'availability proxy')}${tile('模型边际',signed(m.fx.reduce((s,f)=>s+f[1]*f[2],0)),'weighted factors')}${tile('公开边界','非投注建议','information only')}</div>`;return `<div class="table"><table><thead><tr><th>主队盘口</th><th>${m.h[1]} 覆盖</th><th>${m.a[1]} 覆盖</th><th>走盘</th><th>公平赔率</th><th>市场样例</th><th>模型倾向</th></tr></thead><tbody>${m.hc.map(r=>{let lean='观察';if(r.mh&&r.mh>r.fh*1.06)lean=m.h[1];if(r.ma&&r.ma>r.fa*1.06)lean=m.a[1];return `<tr><td class="mono"><b>${r.l>0?'+'+r.l:r.l}</b></td><td>${pct(r.h.pos)}<small class="muted">半赢 ${pct(r.h.hal 气为 Open-Meteo 预测窗口前的城市气候代理值，实时 forecast 接入后自动替换。</p></div>`}function renderTitles(){let rows=titleTable().slice(0,12);$('titles').innerHTML=rows.map((r,i)=>`<div class="titleRow"><div class="rank">${i+1}</div><div class="titleTeam"><b><img class="flag" src="${flag(r.t[4])}"> ${r.t[1]}</b><div class="mini"><i style="width:${Math.max(2,r.title*100)}%"></i></div><span class="titleMeta">${r.t[2]}组 · 进决赛 ${pct(r.final)}</span></div><span class="mono">${pct(r.title)}</span></div>`).join('')}function renderSources(){let src=['FIFA/public schedule seed · 48 teams and 72 group fixtures','football-data.org · pending API key for scores','martj42 international_results · historical backfill adapter','StatsBomb/Opta schema · shots, possession, PPDA, xG','Open-Meteo · forecast window weather feed','Lineup/injury feed · player availability schema','Polymarket Gamma · market price adapter','The Odds API/TheStatsAPI · legal sportsbook odds'];$('sources').innerHTML=src.map(s=>`<div class="src"><b>${s.split(' · ')[0]}</b><p class="muted">${s.split(' · ')[1]}</p></div>`).join('')}document.addEventListener('click',e=>{let m=e.target.closest('[data-m]');if(m){selected=Number(m.dataset.m);render()}let g=e.target.closest('[data-g]');if(g){group=g.dataset.g;render()}let t=e.target.closest('[data-tab]');if(t){tab=t.dataset.tab;render()}});$('q').addEventListener('input',e=>{query=e.target.value;render()});render();
